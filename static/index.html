<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPS Invoice Parser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 64px; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #666; font-size: 0.9rem; margin-bottom: 28px; }

    /* Drop zone */
    .dropzone {
      border: 2px dashed #c0c8d0;
      border-radius: 10px;
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
    }
    .dropzone:hover, .dropzone.over { border-color: #1a5fd6; background: #f0f5ff; }
    .dropzone svg { width: 44px; height: 44px; opacity: 0.55; margin-bottom: 10px; }
    .dropzone strong { font-size: 1rem; display: block; margin-bottom: 4px; }
    .dropzone p { font-size: 0.85rem; color: #666; }
    input[type=file] { display: none; }

    /* Buttons */
    .toolbar { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; align-items: center; }
    button {
      font: inherit; font-size: 0.95rem;
      padding: 10px 22px; border-radius: 8px;
      border: 1px solid #c0c8d0; background: #fff;
      cursor: pointer; transition: background 0.15s;
    }
    button.primary { background: #1a5fd6; color: #fff; border-color: #1a5fd6; }
    button.primary:hover:not(:disabled) { background: #1450b8; }
    button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
    button.ghost:hover { background: #f3f4f6; }

    /* Filename input */
    .name-field { display: flex; align-items: center; gap: 6px; }
    .name-field input {
      font: inherit; font-size: 0.95rem;
      padding: 10px 12px; border-radius: 8px;
      border: 1px solid #c0c8d0; width: 260px;
    }
    .name-field input:focus { outline: none; border-color: #1a5fd6; }
    .name-field .ext { color: #888; font-size: 0.9rem; }

    /* Spinner */
    .progress { display: none; align-items: center; gap: 10px; color: #666; margin-top: 14px; font-size: 0.9rem; }
    .progress.on { display: flex; }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #e0e0e0; border-top-color: #1a5fd6;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Summary bar */
    .bar { display: none; margin-top: 20px; padding: 14px 18px; background: #eef3ff; border-radius: 8px; font-size: 0.9rem; }
    .bar.on { display: block; }
    .bar strong { color: #1a5fd6; }

    /* Status table */
    section { margin-top: 28px; }
    section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 10px; }
    .tbl-wrap { overflow: auto; border: 1px solid #dde1e7; border-radius: 8px; max-height: 360px; }
    table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; white-space: nowrap; }
    th { background: #f0f4f8; position: sticky; top: 0; z-index: 1; font-weight: 600; }
    .ok  { color: #1a7a3e; font-weight: 600; }
    .bad { color: #b91c1c; font-weight: 600; }

    /* Warnings */
    .warns { display: none; margin-top: 16px; padding: 14px 18px; background: #fffbeb; border: 1px solid #fbbf24; border-radius: 8px; font-size: 0.85rem; }
    .warns.on { display: block; }
    .warns ul { margin-top: 6px; padding-left: 18px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>UPS Invoice Parser</h1>
  <p class="sub">Drop UPS PDF invoices, click Parse, then download the summary Excel.</p>

  <div class="dropzone" id="dz" tabindex="0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 16V4m0 0l-4 4m4-4l4 4M4 20h16" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <strong>Drag &amp; drop PDF invoices here</strong>
    <p>or click to browse — multiple files supported</p>
    <input type="file" id="fi" accept=".pdf,application/pdf" multiple />
  </div>

  <div class="toolbar">
    <button class="primary" id="btnParse" disabled>Parse &amp; Export</button>
    <span class="name-field">
      <input type="text" id="fileName" placeholder="File name" />
      <span class="ext">.xlsx</span>
    </span>
    <button class="primary" id="btnDl" disabled>⬇ Download Summary</button>
    <button class="ghost"   id="btnClear">Clear</button>
  </div>

  <div class="progress" id="prog"><div class="spinner"></div><span id="progTxt">Parsing…</span></div>

  <div class="bar" id="bar"></div>

  <div class="warns" id="warns"><strong>Warnings</strong><ul id="warnList"></ul></div>

  <section>
    <h2>Parse results</h2>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>File</th><th>Invoice #</th><th>Account</th>
            <th>Billed</th><th>Tax</th><th>Govt Charges</th>
            <th>Date</th><th>Type</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="tbl"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
  const dz       = document.getElementById('dz');
  const fi       = document.getElementById('fi');
  const btnParse = document.getElementById('btnParse');
  const btnDl    = document.getElementById('btnDl');
  const btnClear = document.getElementById('btnClear');
  const prog     = document.getElementById('prog');
  const progTxt  = document.getElementById('progTxt');
  const bar      = document.getElementById('bar');
  const warns    = document.getElementById('warns');
  const warnList = document.getElementById('warnList');
  const tbl      = document.getElementById('tbl');
  const fileName = document.getElementById('fileName');

  const defaultName = () => `UPS_Invoice_Summary_${new Date().toISOString().slice(0,10)}`;
  fileName.value = defaultName();

  let pendingFiles  = [];   // File[] waiting to be parsed
  let parsedInvoices = [];  // invoice dicts from successful parses

  function fmt$(v) {
    const n = parseFloat(v);
    if (isNaN(n)) return v || '—';
    return n.toLocaleString('en-CA', { style: 'currency', currency: 'CAD' });
  }
  function esc(s) {
    if (!s && s !== 0) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  // ── Drop zone ───────────────────────────────────────────────────────────────
  dz.addEventListener('click', () => fi.click());
  dz.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fi.click(); } });
  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('over'); }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('over'); }));
  dz.addEventListener('drop', e => {
    const files = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (files.length) addFiles(files);
  });
  fi.addEventListener('change', () => { if (fi.files.length) addFiles(Array.from(fi.files)); fi.value = ''; });

  function addFiles(files) {
    pendingFiles = files;
    btnParse.disabled = false;
    bar.classList.remove('on');
    bar.innerHTML = '';
    tbl.innerHTML = '';
    warnList.innerHTML = '';
    warns.classList.remove('on');
    btnDl.disabled = true;
    parsedInvoices = [];
    // Show file names
    bar.classList.add('on');
    bar.innerHTML = `<strong>${files.length}</strong> file(s) selected: ${files.map(f => esc(f.name)).join(', ')}`;
  }

  // ── Parse ───────────────────────────────────────────────────────────────────
  btnParse.addEventListener('click', async () => {
    if (!pendingFiles.length) return;
    prog.classList.add('on');
    progTxt.textContent = `Parsing ${pendingFiles.length} file(s)…`;
    btnParse.disabled = true;
    btnDl.disabled = true;

    const fd = new FormData();
    pendingFiles.forEach(f => fd.append('files', f));

    let data;
    try {
      const res = await fetch('/api/parse', { method: 'POST', body: fd });
      data = await res.json();
    } catch (err) {
      alert('Parse request failed: ' + err);
      prog.classList.remove('on');
      btnParse.disabled = false;
      return;
    }
    prog.classList.remove('on');

    const results = data.results || [];
    parsedInvoices = [];
    tbl.innerHTML = '';
    warnList.innerHTML = '';

    let okCount = 0;
    let totalBilled = 0;
    const allWarns = [];

    for (const r of results) {
      if (r.warnings && r.warnings.length) allWarns.push(...r.warnings);
      const inv = r.ok ? (r.invoice || {}) : {};
      if (r.ok) {
        parsedInvoices.push(inv);
        okCount++;
        totalBilled += parseFloat(inv.billed_amount) || 0;
      }

      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td>${esc(r.filename)}</td>` +
        `<td>${esc(inv.invoice_number)}</td>` +
        `<td>${esc(inv.account_number)}</td>` +
        `<td>${fmt$(inv.billed_amount)}</td>` +
        `<td>${fmt$(inv.tax)}</td>` +
        `<td>${fmt$(inv.government_charges)}</td>` +
        `<td>${esc(inv.invoice_date)}</td>` +
        `<td>${esc(inv.invoice_type_label)}</td>` +
        `<td class="${r.ok ? 'ok' : 'bad'}">${r.ok ? '✓ Parsed' : '✗ Error'}</td>`;
      tbl.appendChild(tr);
    }

    if (allWarns.length) {
      warns.classList.add('on');
      allWarns.forEach(w => { const li = document.createElement('li'); li.textContent = w; warnList.appendChild(li); });
    } else {
      warns.classList.remove('on');
    }

    if (okCount > 0) {
      bar.classList.add('on');
      bar.innerHTML = `<strong>${okCount}</strong> invoice(s) parsed · Total billed: <strong>${fmt$(totalBilled)}</strong>`;
      btnDl.disabled = false;
    } else {
      bar.classList.add('on');
      bar.innerHTML = `<span style="color:#b91c1c">No invoices could be parsed.</span>`;
    }
  });

  // ── Download ─────────────────────────────────────────────────────────────────
  btnDl.addEventListener('click', async () => {
    if (!parsedInvoices.length) return;

    // Sanitize the chosen name; fall back to the default if left blank.
    let name = (fileName.value || '').trim();
    if (!name) name = defaultName();
    name = name.replace(/[\\/:*?"<>|]/g, '_').replace(/\.xlsx$/i, '');

    try {
      const res = await fetch('/api/export/summary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ invoices: parsedInvoices, filename: name }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert(err.error || 'Export failed');
        return;
      }
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${name}.xlsx`;
      a.click();
      URL.revokeObjectURL(a.href);
    } catch (e) {
      alert('Download error: ' + e);
    }
  });

  // ── Clear ────────────────────────────────────────────────────────────────────
  btnClear.addEventListener('click', () => {
    pendingFiles = [];
    parsedInvoices = [];
    tbl.innerHTML = '';
    warnList.innerHTML = '';
    warns.classList.remove('on');
    bar.classList.remove('on');
    bar.innerHTML = '';
    btnParse.disabled = true;
    btnDl.disabled = true;
    fileName.value = defaultName();
  });
</script>
</body>
</html>
